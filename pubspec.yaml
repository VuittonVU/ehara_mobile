name: ehara_mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  #Flutter tidak support SVG secara native, jadi perlu package:
  flutter_svg: ^2.0.10
  #Untuk font Poppins
  google_fonts: ^8.0.2
  #Untuk navigasi antar screens yang lebih rapi dan terstruktur
  go_router: ^14.8.1
  #Untuk bisa tap link external
  url_launcher: ^6.2.5
  #Untuk akses web
  http: ^1.6.0
  #Untuk akses map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  #Untuk GPS
  geolocator: ^12.0.0
  #state management:
  flutter_riverpod: ^2.5.1
  #database lokal
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  webview_flutter: ^4.7.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/ehara/
    - assets/images/articles/
    - assets/images/logo/
    - assets/maskot/
    - assets/splash/
    - assets/icons/
    - assets/background/bg.png
